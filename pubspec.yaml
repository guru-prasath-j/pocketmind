name: pocketmind
description: PocketMind — an offline, on-device AI assistant for your documents. RAG with zero network calls.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_gemma: ^0.8.0          # on-device LLM inference (MediaPipe under the hood)
  provider: ^6.1.2              # lightweight state management
  sqflite: ^2.3.3               # local SQLite store for chunks + embeddings
  path: ^1.9.0
  path_provider: ^2.1.3
  file_picker: ^8.0.0           # import PDF / text files
  syncfusion_flutter_pdf: ^25.2.7  # on-device PDF text extraction

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
