name: pocketmind
description: PocketMind — an offline, on-device AI assistant for your documents. RAG with zero network calls.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_gemma: ^0.16.0         # on-device LLM inference (MediaPipe under the hood)
  flutter_bloc: ^8.1.6          # BLoC state management (Cubits + immutable states)
  equatable: ^2.0.5             # value equality for BLoC states
  sqflite: ^2.3.3               # local SQLite store for chunks + embeddings
  path: ^1.9.0
  path_provider: ^2.1.3
  file_picker: ^8.0.0           # import PDF / text files
  syncfusion_flutter_pdf: ^25.2.7  # on-device PDF text extraction

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/gemma3-1b-it-int4.task
